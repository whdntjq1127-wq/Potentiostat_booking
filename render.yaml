services:
  - type: web
    name: next-js
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    autoDeploy: false
    buildFilter:
      paths:
        - app/**
        - components/**
        - lib/**
        - package.json
        - pnpm-lock.yaml
        - next.config.ts
        - next-env.d.ts
        - tsconfig.json
        - render.yaml
    disk:
      name: reservation-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 10000
      - key: RESERVATION_STORE_FILE
        value: /var/data/reservations.json
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
